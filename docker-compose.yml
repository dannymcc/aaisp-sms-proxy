services:
  aaisp-sms-proxy:
    build: .
    container_name: aaisp-sms-proxy
    restart: unless-stopped
    volumes:
      - ./config:/var/www/html
      - ./data:/var/www/data
      - ./apache.conf:/etc/apache2/conf-enabled/noquerystring.conf:ro
    environment:
      - TZ=Europe/London
    env_file:
      - .env
    networks:
      - docker_default

networks:
  docker_default:
    external: true
